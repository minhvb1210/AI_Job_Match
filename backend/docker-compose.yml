services:
  mysql:
    image: mysql:8
    container_name: ai_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_jobmatch
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: ai_backend
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "python seed_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app

volumes:
  mysql_data:
